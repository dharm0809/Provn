# Walacor Gateway — single command setup
#
#   docker compose up
#
# Starts Gateway + Ollama + OpenWebUI
# OpenWebUI: http://localhost:3000          (override with OPENWEBUI_PORT)
# Gateway health: http://localhost:8002/health
# Gateway lineage: http://localhost:8002/lineage/
#
# ─── Configuration layout ──────────────────────────────────────────────────
# Three env files; compose loads only what each service needs:
#
#   .env                Compose-level interpolation only. Image tags + host
#                       ports referenced as ${VAR} in this file.
#   .env.gateway        Everything the gateway container reads (WALACOR_*,
#                       OPENAI_API_KEY, ANTHROPIC_API_KEY, model routing).
#   .env.openwebui      OpenWebUI's own config (WEBUI_*, the gateway wgk-*
#                       key that OWUI sends as a *client* credential).
#
# Adding a new gateway env var? Add it to .env.gateway (and the .example).
# No compose edits needed — env_file forwards every entry automatically.
# The .env.gateway.example is also the source of truth for the
# test_env_propagation.py CI check.
#
# Why deployment-shape constants (WALACOR_PROVIDER_OLLAMA_URL,
# OPENAI_API_BASE_URL, WALACOR_WAL_PATH) live in `environment:` rather
# than env files: they reference docker-network hostnames and container
# paths, not user-overridable config. They change when the deployment
# shape changes (e.g. moving to k8s), not when the user changes a key.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gateway-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  gateway:
    image: ${GATEWAY_IMAGE:-}
    container_name: gateway-app
    # build:
    #   context: .
    #   dockerfile: deploy/Dockerfile
    ports:
      # Host port overridable via GATEWAY_PORT in .env (matches OPENWEBUI_PORT
      # below). Default 8002 keeps existing local-dev / CI scripts working.
      - "${GATEWAY_PORT:-8002}:8000"
    environment:
      # Deployment-shape constants. The values reference compose-internal
      # hostnames / volume paths and never come from user-managed .env.
      - WALACOR_PROVIDER_OLLAMA_URL=http://ollama:11434
      - WALACOR_WAL_PATH=/var/walacor/wal
    env_file:
      - .env.gateway
    volumes:
      - gateway-wal:/var/walacor/wal
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: gateway-openwebui
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      # Deployment-shape constant: gateway's hostname on the compose network.
      - OPENAI_API_BASE_URL=http://gateway:8000/v1
    env_file:
      - .env.openwebui
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  gateway-wal: {}
  ollama_data: {}
  webui-data: {}
