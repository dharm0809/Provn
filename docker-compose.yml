# Walacor Gateway — single command setup
#
# Prereqs (one-time, per Walacor tenant — schemas don't auto-create):
#   1. Copy .env.example to .env and fill WALACOR_SERVER/USERNAME/PASSWORD
#   2. scripts/provision-walacor.sh   (creates ETIDs 9000031/32/33 on the backend)
#   3. docker compose up -d
#
# Default ports (override via GATEWAY_PORT / OPENWEBUI_PORT in .env):
#   Gateway:  http://localhost:8002/  (health, lineage at /lineage/)
#   OpenWebUI: http://localhost:3000/

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gateway-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  gateway:
    image: ${GATEWAY_IMAGE:-}
    container_name: gateway-app
    # build:
    #   context: .
    #   dockerfile: deploy/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8002}:8000"
    environment:
      - WALACOR_GATEWAY_TENANT_ID=${WALACOR_GATEWAY_TENANT_ID:-dev-tenant}
      - WALACOR_PROVIDER_OLLAMA_URL=http://ollama:11434
      - WALACOR_GATEWAY_PROVIDER=${WALACOR_GATEWAY_PROVIDER:-ollama}
      - WALACOR_GATEWAY_API_KEYS=${WALACOR_GATEWAY_API_KEYS:-}
      - WALACOR_WAL_PATH=/var/walacor/wal
      - WALACOR_SKIP_GOVERNANCE=${WALACOR_SKIP_GOVERNANCE:-false}
      - WALACOR_TOOL_AWARE_ENABLED=${WALACOR_TOOL_AWARE_ENABLED:-true}
      - WALACOR_WEB_SEARCH_ENABLED=${WALACOR_WEB_SEARCH_ENABLED:-true}
      - WALACOR_THINKING_STRIP_ENABLED=${WALACOR_THINKING_STRIP_ENABLED:-true}
      - WALACOR_LINEAGE_ENABLED=${WALACOR_LINEAGE_ENABLED:-true}
      - WALACOR_CONTROL_PLANE_ENABLED=${WALACOR_CONTROL_PLANE_ENABLED:-true}
      - WALACOR_PROVIDER_TIMEOUT=${WALACOR_PROVIDER_TIMEOUT:-300}
      - WALACOR_LOG_LEVEL=${WALACOR_LOG_LEVEL:-INFO}
      - WALACOR_SERVER=${WALACOR_SERVER:-}
      - WALACOR_USERNAME=${WALACOR_USERNAME:-}
      - WALACOR_PASSWORD=${WALACOR_PASSWORD:-}
      - WALACOR_PROVIDER_OPENAI_KEY=${OPENAI_API_KEY:-}
      - WALACOR_PROVIDER_ANTHROPIC_KEY=${ANTHROPIC_API_KEY:-}
      # ETIDs must be provisioned on the Walacor backend before first start —
      # run scripts/provision-walacor.sh (or python scripts/setup_walacor_schemas.py).
      # Defaults match what setup_walacor_schemas.py creates.
      - WALACOR_EXECUTIONS_ETID=${WALACOR_EXECUTIONS_ETID:-9000031}
      - WALACOR_ATTEMPTS_ETID=${WALACOR_ATTEMPTS_ETID:-9000032}
      - WALACOR_TOOL_EVENTS_ETID=${WALACOR_TOOL_EVENTS_ETID:-9000033}
      # Multi-model routing: fnmatch patterns evaluated before path-based routing.
      # Empty = path-based routing only (uses WALACOR_GATEWAY_PROVIDER).
      - WALACOR_MODEL_ROUTING_JSON=${WALACOR_MODEL_ROUTING_JSON:-}
    volumes:
      - gateway-wal:/var/walacor/wal
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: gateway-openwebui
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://gateway:8000/v1
      # If WALACOR_GATEWAY_API_KEYS has multiple comma-separated keys, set
      # WEBUI_GATEWAY_API_KEY to a single one — OpenWebUI sends the whole
      # value as the bearer and won't match a comma list.
      - OPENAI_API_KEY=${WEBUI_GATEWAY_API_KEY:-${WALACOR_GATEWAY_API_KEYS:-dev-key}}
      - ENABLE_OLLAMA_API=false
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - ENABLE_DIRECT_CONNECTIONS=false
      - ENABLE_SIGNUP=true
      - WEBUI_NAME=${WEBUI_NAME:-Walacor Chat}
      # Stable secret key — without this, OpenWebUI auto-generates a new key on
      # every container restart, invalidating all session tokens (users get
      # logged out, newly-added admin users appear to "reset"). Set a long
      # random value in your .env (see .env.example) and keep it unchanged
      # across deployments so credentials persist.
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-to-a-long-random-string}
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  gateway-wal: {}
  ollama_data: {}
  webui-data: {}
