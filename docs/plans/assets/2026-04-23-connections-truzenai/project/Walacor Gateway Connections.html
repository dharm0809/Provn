<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Walacor Gateway — Connections</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="overview/styles.css" />
<link rel="stylesheet" href="src/gateway/lineage/dashboard/src/styles/connections.css" />
<style>
  /* Minimal inline chrome for JsonView / CopyBtn — real dashboard loads
     these from exec-drawer.css; we inline here to keep the preview self
     contained without touching that upstream file. */
  .exec-json-wrap {
    border: 1px solid var(--border);
    background: var(--bg-inset, var(--bg-surface));
    margin-top: 10px;
    font-family: var(--mono);
  }
  .exec-json-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    background: var(--bg-surface);
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  .exec-json-head-label { color: var(--text-secondary); }
  .exec-json-body {
    margin: 0;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.55;
    color: var(--text-primary);
    overflow-x: auto;
    max-height: none;
  }
  .j-key   { color: var(--gold); }
  .j-str   { color: var(--green); }
  .j-num   { color: var(--blue); }
  .j-bool  { color: var(--amber); }
  .j-null  { color: var(--text-muted); font-style: italic; }
  .j-punct { color: var(--text-muted); }
  .exec-copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 8px;
    font: 500 10px/1 var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 80ms, border-color 80ms;
  }
  .exec-copy-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
  .exec-copy-btn.is-copied { color: var(--green); border-color: var(--green); }

  /* Preview shell — borrows layout from app-shell.css but unscoped so
     the demo works without pulling the full production shell. */
  body { margin: 0; background: var(--bg-root); color: var(--text-primary); }
  .app { display: flex; min-height: 100vh; }
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main { flex: 1; min-width: 0; }
  .fade-in { animation: fade-in 220ms ease both; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* Topbar toast for nav intent */
  .cx-toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--gold-dim);
    padding: 10px 18px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.1em;
    box-shadow: 0 8px 24px var(--shadow);
    z-index: 300;
    animation: fade-in 200ms ease;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="overview/connections.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  const NAV_ITEMS = [
    { key: 'overview', label: 'Overview' },
    { key: 'intel', label: 'Intelligence' },
    { key: 'sessions', label: 'Sessions' },
    { key: 'attempts', label: 'Attempts' },
    { key: 'control', label: 'Control' },
    { key: 'compliance', label: 'Compliance' },
    { key: 'connections', label: 'Connections' },
    { key: 'playground', label: 'Playground' },
  ];

  const navIcons = {
    overview:   <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="2" y="2" width="5.5" height="5.5"/><rect x="10.5" y="2" width="5.5" height="5.5"/><rect x="2" y="10.5" width="5.5" height="5.5"/><rect x="10.5" y="10.5" width="5.5" height="5.5"/></svg>,
    intel:      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 1.5l6 3v4.5c0 3-2.5 6-6 7.5-3.5-1.5-6-4.5-6-7.5V4.5l6-3z"/><path d="M9 6v3l2 2"/></svg>,
    sessions:   <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M2 5h14M2 9h14M2 13h10"/></svg>,
    attempts:   <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 9h3l2-5 3 10 2-5h6"/></svg>,
    control:    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M2 4h4m4 0h6M2 9h8m4 0h2M2 14h2m4 0h8"/><circle cx="9" cy="4" r="1.5" fill="currentColor"/><circle cx="13" cy="9" r="1.5" fill="currentColor"/><circle cx="5" cy="14" r="1.5" fill="currentColor"/></svg>,
    compliance: <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 1.5L2.5 4.5v5c0 4 3 6.5 6.5 7.5 3.5-1 6.5-3.5 6.5-7.5v-5L9 1.5z"/><path d="M6.5 9l2 2 3.5-3.5"/></svg>,
    connections:<svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="4" cy="4" r="1.6"/><circle cx="14" cy="4" r="1.6"/><circle cx="4" cy="14" r="1.6"/><circle cx="14" cy="14" r="1.6"/><circle cx="9" cy="9" r="1.8"/><path d="M5.2 5.2l2.6 2.6M12.8 5.2l-2.6 2.6M5.2 12.8l2.6-2.6M12.8 12.8l-2.6-2.6"/></svg>,
    playground: <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 5l5 4-5 4M9 14h7"/></svg>,
  };

  function Sidebar({ activeView, setActiveView }) {
    return (
      <aside className="sidebar">
        <div className="sb-brand"><span className="sb-diamond">◆</span></div>
        <nav className="sb-nav">
          {NAV_ITEMS.map(it => (
            <button
              key={it.key}
              className={`sb-item${it.key === activeView ? ' active' : ''}`}
              title={it.label.toUpperCase()}
              onClick={() => setActiveView(it.key)}>
              {navIcons[it.key]}
            </button>
          ))}
        </nav>
      </aside>
    );
  }

  function Topbar({ theme, setTheme, viewLabel }) {
    const [time, setTime] = useState(new Date());
    useEffect(() => {
      const t = setInterval(() => setTime(new Date()), 1000);
      return () => clearInterval(t);
    }, []);
    const subsystems = [
      { label: 'WAL', ok: true },
      { label: 'PROVIDERS', ok: true },
      { label: 'CHAIN', ok: true },
      { label: 'BUDGET', ok: true },
      { label: 'ANALYZERS', ok: true },
    ];
    return (
      <header className="topbar">
        <div className="topbar-left">{viewLabel}</div>
        <div className="topbar-right">
          <div className="topbar-sub">
            {subsystems.map(s => (
              <span key={s.label} className="topbar-sub-dot" title={s.label}>
                <span className={`topbar-sub-indicator ${s.ok ? 'ok' : 'down'}`} />
                <span>{s.label}</span>
              </span>
            ))}
          </div>
          <span className="sep">│</span>
          <span className="time">{time.toTimeString().slice(0, 8)} UTC</span>
          <span className="sep">│</span>
          <span>ENFORCED · 4d 12h</span>
          <span className="sep">│</span>
          <button
            className="theme-toggle"
            onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            title={`Switch to ${theme === 'dark' ? 'light' : 'dark'} mode`}
            aria-label="Toggle theme">
            <span className="theme-toggle-track">
              <span className={`theme-toggle-thumb ${theme}`}>
                {theme === 'dark'
                  ? <svg viewBox="0 0 16 16" width="10" height="10" aria-hidden="true"><path fill="currentColor" d="M6 0a6 6 0 1 0 6 6A4 4 0 0 1 6 0z"/></svg>
                  : <svg viewBox="0 0 16 16" width="10" height="10" aria-hidden="true"><circle cx="8" cy="8" r="3.2" fill="currentColor"/><g stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"><line x1="8" y1="0.8" x2="8" y2="2.6"/><line x1="8" y1="13.4" x2="8" y2="15.2"/><line x1="0.8" y1="8" x2="2.6" y2="8"/><line x1="13.4" y1="8" x2="15.2" y2="8"/><line x1="2.9" y1="2.9" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="13.1" y2="13.1"/><line x1="2.9" y1="13.1" x2="4.2" y2="11.8"/><line x1="11.8" y1="4.2" x2="13.1" y2="2.9"/></g></svg>}
              </span>
            </span>
            <span className="theme-toggle-label">{theme === 'dark' ? 'DARK' : 'LIGHT'}</span>
          </button>
        </div>
      </header>
    );
  }

  function ViewPlaceholder({ label }) {
    return (
      <div style={{ padding: '60px 32px', textAlign: 'center', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: 12, letterSpacing: '0.1em' }}>
        <div style={{ fontSize: 24, color: 'var(--gold)', marginBottom: 14 }}>◆</div>
        <div style={{ textTransform: 'uppercase', marginBottom: 6 }}>{label}</div>
        <div>Stub — this preview scopes only the Connections page.</div>
      </div>
    );
  }

  function App() {
    const [activeView, setActiveView] = useState('connections');
    const [theme, setTheme] = useState('light');
    const [toast, setToast] = useState(null);

    useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
    }, [theme]);

    const navigate = (view, params) => {
      if (view === 'sessions' && params && params.q) {
        setToast(`→ sessions · filter: ${params.q}`);
        setTimeout(() => setToast(null), 2200);
        return;
      }
      setActiveView(view);
    };

    const viewLabel = (NAV_ITEMS.find(i => i.key === activeView) || { label: '—' }).label;

    return (
      <div className="app">
        <Sidebar activeView={activeView} setActiveView={setActiveView} />
        <div className="content">
          <Topbar theme={theme} setTheme={setTheme} viewLabel={viewLabel} />
          <main className="main fade-in" key={activeView}>
            {activeView === 'connections'
              ? <ConnectionsView navigate={navigate} />
              : <ViewPlaceholder label={viewLabel} />}
          </main>
        </div>
        {toast && <div className="cx-toast">{toast}</div>}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
