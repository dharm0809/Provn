<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Walacor Gateway — Connections v4 (Incident cockpit)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="overview/styles.css" />
<link rel="stylesheet" href="src/gateway/lineage/dashboard/src/styles/connections.css" />
<link rel="stylesheet" href="overview/connections-v4.css" />
<style>
  .exec-json-wrap { border: 1px solid var(--border); background: var(--bg-inset, var(--bg-surface)); margin-top: 10px; font-family: var(--mono); }
  .exec-json-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; background: var(--bg-surface); font-size: 11px; letter-spacing: 0.08em; }
  .exec-json-head-label { color: var(--text-secondary); }
  .exec-json-body { margin: 0; padding: 12px 14px; font-size: 12px; line-height: 1.55; color: var(--text-primary); overflow-x: auto; }
  .j-key { color: var(--gold); } .j-str { color: var(--green); } .j-num { color: var(--blue); } .j-bool { color: var(--amber); } .j-null { color: var(--text-muted); font-style: italic; } .j-punct { color: var(--text-muted); }
  .exec-copy-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 3px 8px; font: 500 10px/1 var(--mono); letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
  .exec-copy-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
  .exec-copy-btn.is-copied { color: var(--green); border-color: var(--green); }

  body { margin: 0; background: var(--bg-root); color: var(--text-primary); }
  .app { display: flex; min-height: 100vh; }
  .content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main { flex: 1; min-width: 0; }
  .fade-in { animation: fade-in 220ms ease both; }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .cx-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-elevated); border: 1px solid var(--gold-dim); padding: 10px 18px; font-family: var(--mono); font-size: 12px; color: var(--gold); letter-spacing: 0.1em; z-index: 300; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="overview/connections-data.js"></script>
<script type="text/babel" src="overview/connections-shared.jsx"></script>
<script type="text/babel" src="overview/connections-v4.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [activeView, setActiveView] = useState('connections');
    const [theme, setTheme] = useState('light');
    const [toast, setToast] = useState(null);
    useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
    const navigate = (view, params) => {
      if (view === 'sessions' && params && params.q) {
        setToast(`→ sessions · filter: ${params.q}`);
        setTimeout(() => setToast(null), 2200);
        return;
      }
      setActiveView(view);
    };
    const viewLabel = activeView === 'connections' ? 'Connections' : activeView[0].toUpperCase() + activeView.slice(1);
    return (
      <div className="app">
        <CxSidebar activeView={activeView} setActiveView={setActiveView} />
        <div className="content">
          <CxTopbar theme={theme} setTheme={setTheme} viewLabel={viewLabel} variant="V4" variantLabel="COCKPIT" />
          <main className="main fade-in" key={activeView}>
            {activeView === 'connections' ? <V4View navigate={navigate} /> : <CxViewPlaceholder label={viewLabel} />}
          </main>
        </div>
        {toast && <div className="cx-toast">{toast}</div>}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
