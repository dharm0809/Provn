name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ECR_REPOSITORY: provn-gateway

jobs:
  # ═══════════════════════════════════════════════════
  # Stage 1: Unit Tests
  # ═══════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -x -q --tb=short 2>&1 | tail -20

      - name: Test summary
        if: always()
        run: echo "Unit tests completed"

  # ═══════════════════════════════════════════════════
  # Stage 2: Build & Push to AWS ECR
  # ═══════════════════════════════════════════════════
  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      full_image: ${{ steps.tag.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "full_image=$ECR_REGISTRY/$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}

      - name: Confirm push
        env:
          FULL_IMAGE: ${{ steps.tag.outputs.full_image }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "Pushed $FULL_IMAGE:latest and $FULL_IMAGE:$TAG"

  # ═══════════════════════════════════════════════════
  # Stage 3: Deploy to EC2
  # Requires: EC2_HOST, EC2_USER, EC2_DEPLOY_KEY,
  #           AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  #           AWS_REGION, AWS_ACCOUNT_ID
  # ═══════════════════════════════════════════════════
  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          port: 22
          envs: AWS_ACCOUNT_ID,AWS_REGION
          script: |
            set -e

            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            IMAGE="$ECR_REGISTRY/provn-gateway:latest"

            echo "=== Deploy Gateway from ECR ==="

            # 1. Login to ECR
            ECR_PASSWORD=$(aws ecr get-login-password --region "$AWS_REGION")
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # 2. Pull latest image
            docker pull "$IMAGE"

            # 3. Persist image reference and restart
            cd ~/Gateway
            sed -i '/^GATEWAY_IMAGE=/d' .env 2>/dev/null || true
            echo "GATEWAY_IMAGE=$IMAGE" >> .env
            docker compose down gateway
            docker compose up -d --no-build --force-recreate gateway

            # 4. Health check
            echo "Waiting for gateway to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8002/health > /dev/null 2>&1; then
                echo "DEPLOY OK — Gateway healthy"
                curl -s http://localhost:8002/health | python3 -m json.tool | head -5
                exit 0
              fi
              sleep 3
            done

            echo "DEPLOY FAILED — gateway not healthy after 90s"
            docker compose logs gateway --tail=20
            exit 1
