name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/dharm0809/walacor-gateway

jobs:
  # ═══════════════════════════════════════════════════
  # Stage 1: Lint + Unit Tests
  # ═══════════════════════════════════════════════════
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -x -q --tb=short 2>&1 | tail -20

      - name: Test summary
        if: always()
        run: echo "Unit tests completed"

  # ═══════════════════════════════════════════════════
  # Stage 2: Build Docker Image
  # ═══════════════════════════════════════════════════
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: dharm0809
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/dharm0809/walacor-gateway:latest
            ghcr.io/dharm0809/walacor-gateway:${{ steps.tag.outputs.tag }}

      - name: Confirm push
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "Pushed $IMAGE:latest and $IMAGE:$TAG"

  # ═══════════════════════════════════════════════════
  # Stage 3: Deploy to EC2
  # Requires: EC2_HOST, EC2_USER, EC2_DEPLOY_KEY secrets
  # Uses a DEPLOY-ONLY key (not personal SSH key)
  # Set up "production" environment with manual approval
  # ═══════════════════════════════════════════════════
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          port: 22
          script: |
            cd ~/Gateway
            git pull origin main
            docker pull ghcr.io/dharm0809/walacor-gateway:latest
            docker compose down gateway
            docker compose up -d
            sleep 20
            curl -sf http://localhost:8002/health && echo "DEPLOY OK" || echo "DEPLOY FAILED"
