name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  ECR_REPOSITORY: provn-gateway
  # Opt every JS-based action into Node 24. GitHub will force this default
  # on June 2nd 2026; setting it explicitly now silences the deprecation
  # warnings on actions/checkout@v4, actions/setup-python@v5, etc., and
  # avoids the inevitable surprise breakage on the day the flip happens.
  # Reference: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -x -q --tb=short 2>&1 | tail -20

      - name: Test summary
        if: always()
        run: echo "Unit tests completed"

  build:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      full_image: ${{ steps.tag.outputs.full_image }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "full_image=$ECR_REGISTRY/$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push to ECR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          no-cache: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tag.outputs.tag }}

      - name: Confirm push
        env:
          FULL_IMAGE: ${{ steps.tag.outputs.full_image }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: echo "Pushed $FULL_IMAGE:latest and $FULL_IMAGE:$TAG"

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_DEPLOY_KEY }}
          port: 22
          envs: AWS_ACCOUNT_ID,AWS_REGION,IMAGE_DIGEST
          script: |
            set -e

            ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
            # Pin to the immutable digest produced by `Build and push to ECR`
            # so a concurrent `:latest` push can't slip an unintended image
            # into the deploy under our feet.
            IMAGE="$ECR_REGISTRY/provn-gateway@$IMAGE_DIGEST"

            echo "=== Deploy Gateway from ECR ==="
            echo "Image: $IMAGE"

            # 1. Login to ECR
            ECR_PASSWORD=$(aws ecr get-login-password --region "$AWS_REGION")
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # 2. Move to project directory
            cd ~/Gateway

            # 3. Sync latest repo on EC2
            git fetch origin main
            git reset --hard origin/main

            # 4. Pull gateway image by digest
            docker pull "$IMAGE"

            # 5. Persist GATEWAY_IMAGE (digest-pinned) in .env
            touch .env
            sed -i '/^GATEWAY_IMAGE=/d' .env || true
            echo "GATEWAY_IMAGE=$IMAGE" >> .env

            # 6. Restart full stack cleanly
            docker compose down --remove-orphans || true
            # Force-remove any leftover containers that compose down missed
            docker ps -aq --filter "name=gateway-" | xargs -r docker rm -f 2>/dev/null || true
            docker compose up -d --force-recreate

            # 7. Health check
            # Probe the container's internal port directly via `docker exec`
            # instead of the host port — the host port is configurable via
            # GATEWAY_PORT in .env (8002 default, 8100 on prod), and the old
            # hardcoded `localhost:8002` failed every deploy on hosts that
            # remapped the port.
            # Bumped to 5 min (was 90 s) — cold start with ONNX model load,
            # intelligence layer init, and Walacor login regularly runs 3-4 min.
            echo "Waiting for gateway to start (up to 5 min)..."
            for i in $(seq 1 60); do
              if docker exec gateway-app python -c \
                "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else 1)" \
                > /dev/null 2>&1; then
                echo "DEPLOY OK — Gateway healthy after ${i}x5s"
                docker exec gateway-app python -c \
                  "import urllib.request, json; print(json.dumps(json.loads(urllib.request.urlopen('http://localhost:8000/health').read())['status']))"
                exit 0
              fi
              sleep 5
            done

            echo "DEPLOY FAILED — gateway not healthy after 300s"
            docker compose ps
            docker compose logs gateway --tail=80
            docker compose logs openwebui --tail=50 || true
            exit 1
