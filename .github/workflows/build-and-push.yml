name: Build & Push Gateway Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dharm0809/walacor-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: dharm0809
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/dharm0809/walacor-gateway:latest
            ghcr.io/dharm0809/walacor-gateway:${{ github.sha }}

      - name: Done
        run: echo "Image pushed to ghcr.io/dharm0809/walacor-gateway:latest"
