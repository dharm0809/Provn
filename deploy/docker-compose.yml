# Gateway for local dev. Build from repo root: docker-compose -f Gateway/deploy/docker-compose.yml up
# Required host env vars: WALACOR_SERVER, WALACOR_USERNAME, WALACOR_PASSWORD
# Optional: WALACOR_CONTROL_PLANE_URL, OPENAI_API_KEY, ANTHROPIC_API_KEY
# To start with Redis: docker-compose --profile redis up
# To run the full demo: docker compose --profile demo up
version: "3.8"
services:
  redis:
    image: redis:7-alpine
    profiles: [redis]
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

  ollama:
    image: ollama/ollama:latest
    profiles: [demo, ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  gateway:
    build:
      context: ../..
      dockerfile: Gateway/deploy/Dockerfile
    ports:
      - "8002:8000"
    environment:
      # Identity
      - WALACOR_GATEWAY_TENANT_ID=${WALACOR_GATEWAY_TENANT_ID:-dev-tenant}
      # Walacor backend storage (replaces SQLite WAL when all three are set)
      - WALACOR_SERVER=${WALACOR_SERVER:-}
      - WALACOR_USERNAME=${WALACOR_USERNAME:-}
      - WALACOR_PASSWORD=${WALACOR_PASSWORD:-}
      # Governance (required when WALACOR_SKIP_GOVERNANCE=false and no Walacor storage)
      - WALACOR_CONTROL_PLANE_URL=${WALACOR_CONTROL_PLANE_URL:-}
      - WALACOR_CONTROL_PLANE_API_KEY=${WALACOR_CONTROL_PLANE_API_KEY:-}
      - WALACOR_SKIP_GOVERNANCE=${WALACOR_SKIP_GOVERNANCE:-false}
      # Provider credentials
      - WALACOR_PROVIDER_OPENAI_KEY=${OPENAI_API_KEY:-}
      - WALACOR_PROVIDER_ANTHROPIC_KEY=${ANTHROPIC_API_KEY:-}
      # Ollama: point at the companion service in demo profile
      - WALACOR_PROVIDER_OLLAMA_URL=${WALACOR_PROVIDER_OLLAMA_URL:-http://ollama:11434}
      - WALACOR_GATEWAY_PROVIDER=${WALACOR_GATEWAY_PROVIDER:-ollama}
      # Caller auth (comma-separated API keys)
      - WALACOR_GATEWAY_API_KEYS=${WALACOR_GATEWAY_API_KEYS:-}
      # WAL path (used only when Walacor storage is not configured)
      - WALACOR_WAL_PATH=/var/walacor/wal
      # Phase 15: Redis + model routing
      - WALACOR_REDIS_URL=${WALACOR_REDIS_URL:-}
      - WALACOR_MODEL_ROUTING_JSON=${WALACOR_MODEL_ROUTING_JSON:-}
      # Phase 16: Web search + tool awareness
      - WALACOR_TOOL_AWARE_ENABLED=${WALACOR_TOOL_AWARE_ENABLED:-true}
      - WALACOR_WEB_SEARCH_ENABLED=${WALACOR_WEB_SEARCH_ENABLED:-true}
      # Phase 17: Thinking strip + Llama Guard + OTel
      - WALACOR_THINKING_STRIP_ENABLED=${WALACOR_THINKING_STRIP_ENABLED:-true}
      - WALACOR_LLAMA_GUARD_ENABLED=${WALACOR_LLAMA_GUARD_ENABLED:-false}
      - WALACOR_OTEL_ENABLED=${WALACOR_OTEL_ENABLED:-false}
      - WALACOR_OTEL_ENDPOINT=${WALACOR_OTEL_ENDPOINT:-http://localhost:4317}
      # Phase 18: Lineage dashboard
      - WALACOR_LINEAGE_ENABLED=${WALACOR_LINEAGE_ENABLED:-true}
      # Phase 20: Embedded control plane
      - WALACOR_CONTROL_PLANE_ENABLED=${WALACOR_CONTROL_PLANE_ENABLED:-true}
      # Observability
      - WALACOR_LOG_LEVEL=${WALACOR_LOG_LEVEL:-INFO}
    volumes:
      - gateway-wal:/var/walacor/wal
    depends_on:
      redis:
        condition: service_started
        required: false
      ollama:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  demo-init:
    image: python:3.12-slim
    profiles: [demo]
    command: python /demo/quickstart.py
    depends_on:
      gateway:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ../demo:/demo
    environment:
      - GATEWAY_URL=http://gateway:8000
      - DEMO_MODEL=${DEMO_MODEL:-qwen3:1.7b}
      - OLLAMA_URL=http://ollama:11434

  model-init:
    image: ollama/ollama:latest
    profiles: [openwebui]
    entrypoint: ["ollama", "pull", "qwen3:1.7b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    profiles: [openwebui]
    ports:
      - "3000:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      # Route ALL chat traffic through Gateway (governed)
      - OPENAI_API_BASE_URL=http://gateway:8000/v1
      - OPENAI_API_KEY=${WALACOR_GATEWAY_API_KEYS:-dev-key}
      # Disable direct Ollama access — all traffic must go through Gateway
      - ENABLE_OLLAMA_API=false
      # Forward OpenWebUI user identity (name, id, email, role) to Gateway
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      # Disable user-level direct API connections (prevents governance bypass)
      - ENABLE_DIRECT_CONNECTIONS=false
      # Branding
      - WEBUI_NAME=${WEBUI_NAME:-Walacor Chat}
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  gateway-wal: {}
  ollama_data: {}
  webui-data: {}
