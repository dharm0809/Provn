# Hybrid deployment: Go proxy (port 8080) + Python intelligence sidecar (gRPC :50051)
#
# Usage:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.hybrid.yml up
#
# The Go proxy handles HTTP ingress, streaming, and LLM provider forwarding.
# The Python sidecar handles governance: policy, content analysis, session chains, audit.
#
# Python-only mode (default, unchanged):
#   docker compose -f deploy/docker-compose.yml up

services:
  # Go proxy — HTTP front-end
  proxy:
    build:
      context: ..
      dockerfile: proxy/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - PROXY_LISTEN_ADDR=:8080
      - PROXY_BRAIN_ADDR=brain:50051
      - PROXY_LLM_PROVIDERS=${PROXY_LLM_PROVIDERS:-ollama:http://ollama:11434}
      - PROXY_API_KEYS=${WALACOR_GATEWAY_API_KEYS:-}
      - PROXY_RATE_LIMIT_RPS=${PROXY_RATE_LIMIT_RPS:-100}
      - PROXY_CACHE_ENABLED=${PROXY_CACHE_ENABLED:-false}
      - PROXY_READ_TIMEOUT=${PROXY_READ_TIMEOUT:-30s}
      - PROXY_WRITE_TIMEOUT=${PROXY_WRITE_TIMEOUT:-120s}
    depends_on:
      brain:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

  # Python intelligence sidecar — gRPC governance engine
  brain:
    build:
      context: ../..
      dockerfile: Gateway/deploy/Dockerfile
    command: ["python", "-m", "gateway.grpc"]
    expose:
      - "50051"
    environment:
      # gRPC mode
      - WALACOR_GRPC_ENABLED=true
      - WALACOR_GRPC_PORT=50051
      # Identity
      - WALACOR_GATEWAY_TENANT_ID=${WALACOR_GATEWAY_TENANT_ID:-dev-tenant}
      # Walacor backend storage
      - WALACOR_SERVER=${WALACOR_SERVER:-}
      - WALACOR_USERNAME=${WALACOR_USERNAME:-}
      - WALACOR_PASSWORD=${WALACOR_PASSWORD:-}
      # Governance
      - WALACOR_SKIP_GOVERNANCE=${WALACOR_SKIP_GOVERNANCE:-false}
      - WALACOR_CONTROL_PLANE_URL=${WALACOR_CONTROL_PLANE_URL:-}
      - WALACOR_CONTROL_PLANE_API_KEY=${WALACOR_CONTROL_PLANE_API_KEY:-}
      - WALACOR_CONTROL_PLANE_ENABLED=${WALACOR_CONTROL_PLANE_ENABLED:-true}
      # Provider credentials (for tool execution via sidecar)
      - WALACOR_PROVIDER_OPENAI_KEY=${OPENAI_API_KEY:-}
      - WALACOR_PROVIDER_ANTHROPIC_KEY=${ANTHROPIC_API_KEY:-}
      - WALACOR_PROVIDER_OLLAMA_URL=${WALACOR_PROVIDER_OLLAMA_URL:-http://ollama:11434}
      # Caller auth (for control plane API)
      - WALACOR_GATEWAY_API_KEYS=${WALACOR_GATEWAY_API_KEYS:-}
      # Storage
      - WALACOR_WAL_PATH=/var/walacor/wal
      # Content analysis
      - WALACOR_THINKING_STRIP_ENABLED=${WALACOR_THINKING_STRIP_ENABLED:-true}
      - WALACOR_LLAMA_GUARD_ENABLED=${WALACOR_LLAMA_GUARD_ENABLED:-false}
      # Lineage (still served by sidecar for dashboard)
      - WALACOR_LINEAGE_ENABLED=${WALACOR_LINEAGE_ENABLED:-true}
      # Logging
      - WALACOR_LOG_LEVEL=${WALACOR_LOG_LEVEL:-INFO}
    volumes:
      - gateway-wal:/var/walacor/wal
    depends_on:
      ollama:
        condition: service_healthy
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=2)"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Override: disable the Python-only gateway service (proxy replaces it)
  gateway:
    profiles: [python-only]
